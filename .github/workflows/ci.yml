name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Tested modules (guardrails, prompts, profile_graph) are stdlib-only —
      # no Streamlit/torch install needed, so CI is fast and key-free.
      - run: pip install pytest
      - run: python -m pytest tests/ -q
